<!DOCTYPE html>
<html>
<head>
  <title>Loan Calculator</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    input { padding: 10px; margin: 5px; }
    button { padding: 10px; }
  </style>
</head>
<body>

<h1>Loan Payment Calculator</h1>

<input id="amount" placeholder="Loan Amount"><br>
<input id="rate" placeholder="Interest %"><br>
<input id="years" placeholder="Years"><br>

<button onclick="calculate()">Calculate</button>

<h2 id="result"></h2>

<script>
function calculate() {
  let P = document.getElementById("amount").value;
  let r = document.getElementById("rate").value / 100 / 12;
  let n = document.getElementById("years").value * 12;

  let payment = (P * r) / (1 - Math.pow(1 + r, -n));
  document.getElementById("result").innerText =
    "Monthly Payment: $" + payment.toFixed(2);
}
</script>

</body>
</html>

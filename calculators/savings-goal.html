<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savings Goal Calculator - SheetXCell</title>
  <meta name="description" content="Calculate how much you need to save each month to reach your goal." />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a href="../index.html" class="brand">SheetXCell</a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../calculators.html" class="active">Calculators</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../contact.html">Contact</a></li>
      </ul>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="page-hero">
        <h1>Savings Goal Calculator</h1>
        <p>Estimate the monthly savings needed to reach a future target amount within your timeline.</p>
      </section>

      <section class="section calculator-layout">
        <div class="panel calculator-box">
          <label for="savingsGoal">Savings Goal</label>
          <input type="number" id="savingsGoal" placeholder="10000" />

          <label for="savingsRate">Annual Return / Interest Rate (%)</label>
          <input type="number" id="savingsRate" placeholder="3" step="0.01" />

          <label for="savingsYears">Years to Reach Goal</label>
          <input type="number" id="savingsYears" placeholder="3" />

          <button onclick="calculateSavingsGoal()">Calculate</button>
          <p class="small-note">Use this to estimate a monthly contribution target.</p>
        </div>

        <div class="panel">
          <div id="savingsResult" class="result-box">
            <p><strong>Monthly Savings Needed:</strong> Your result will appear here.</p>
</html>

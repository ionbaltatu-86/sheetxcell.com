<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debt Payoff Calculator - SheetXCell</title>
  <meta name="description" content="Estimate how long it may take to pay off debt." />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header>
    <nav class="nav container">
      <a href="../index.html" class="brand">SheetXCell</a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../calculators.html">Calculators</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="section">
      <h1>Debt Payoff Calculator</h1>
      <p>Estimate how long it may take to eliminate your debt.</p>

      <div class="calculator-box">
        <label for="debtAmount">Debt Amount</label>
        <input type="number" id="debtAmount" placeholder="40000" />

        <label for="debtRate">Annual Interest Rate (%)</label>
        <input type="number" id="debtRate" placeholder="7.44" step="0.01" />

        <label for="debtMonthlyPayment">Monthly Payment</label>
        <input type="number" id="debtMonthlyPayment" placeholder="500" />

        <button onclick="calculateDebtPayoff()">Calculate</button>

        <div id="debtResult" class="result-box">
          <p class="small-note">Your results will appear here.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 SheetXCell. All rights reserved.</p>
    </div>
  </footer>

  <script src="../script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Payment Calculator - SheetXCell</title>
  <meta name="description" content="Calculate your monthly loan payment, total paid, and interest." />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header>
    <nav class="nav container">
      <a href="../index.html" class="brand">SheetXCell</a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../calculators.html">Calculators</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="section">
      <h1>Loan Payment Calculator</h1>
      <p>Estimate your monthly payment, total paid, and total interest.</p>

      <div class="calculator-box">
        <label for="loanAmount">Loan Amount</label>
        <input type="number" id="loanAmount" placeholder="20000" />

        <label for="interestRate">Annual Interest Rate (%)</label>
        <input type="number" id="interestRate" placeholder="7" step="0.01" />

        <label for="loanYears">Loan Term (years)</label>
        <input type="number" id="loanYears" placeholder="5" />

        <button onclick="calculateLoan()">Calculate</button>

        <div id="loanResult" class="result-box">
          <p class="small-note">Your results will appear here.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
  <div class="container footer-links-wrap">
    <p>© 2026 SheetXCell. All rights reserved.</p>
    <div class="footer-links">
      <a href="../privacy-policy.html">Privacy Policy</a>
      <a href="../terms.html">Terms</a>
      <a href="../disclaimer.html">Disclaimer</a>
    </div>
  </div>
</footer>

  <script src="../script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortgage Extra Payment Calculator - SheetXCell</title>
  <meta name="description" content="See how extra mortgage payments may reduce interest and shorten your loan term." />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header>
    <nav class="nav container">
      <a href="../index.html" class="brand">SheetXCell</a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../calculators.html">Calculators</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="section">
      <h1>Mortgage Extra Payment Calculator</h1>
      <p>Estimate how much time and interest you could save with extra monthly payments.</p>

      <div class="calculator-box">
        <label for="mortgageAmount">Mortgage Amount</label>
        <input type="number" id="mortgageAmount" placeholder="300000" />

        <label for="mortgageRate">Annual Interest Rate (%)</label>
        <input type="number" id="mortgageRate" placeholder="5.5" step="0.01" />

        <label for="mortgageYears">Mortgage Term (years)</label>
        <input type="number" id="mortgageYears" placeholder="25" />

        <label for="extraPayment">Extra Monthly Payment</label>
        <input type="number" id="extraPayment" placeholder="200" />

        <button onclick="calculateMortgageExtra()">Calculate</button>

        <div id="mortgageResult" class="result-box">
          <p class="small-note">Your results will appear here.</p>
        </div>
      </div>
    </section>
  </main>

 <footer class="footer">
  <div class="container footer-links-wrap">
    <p>© 2026 SheetXCell. All rights reserved.</p>

      <a href="../privacy-policy.html">Privacy Policy</a>
      <a href="../terms.html">Terms</a>

    </div>
  </div>
</footer>

  <script src="../script.js"></script>
</body>
</html>
